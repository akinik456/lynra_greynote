name: LynraGreyNote
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+8

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  
  flutter_localizations:
    sdk: flutter
  intl: any # Tarih, saat ve sayı formatları için şart
  
  cupertino_icons: ^1.0.8
  #sqflite: ^2.4.2
  sqflite_sqlcipher: ^3.4.0
  path: ^1.9.1
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  cryptography: ^2.7.0
  uuid: ^4.5.1
  crypto: ^3.0.3
  flutter_windowmanager_plus: ^1.0.1
  open_filex: ^4.4.0
  in_app_purchase: ^3.1.11
  shared_preferences: ^2.2.2
  device_info_plus: ^11.3.0
  in_app_update: ^4.2.3
  package_info_plus: ^8.3.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  pattern_lock: ^2.0.0
  flutter_launcher_icons: ^0.14.4
  file_saver: ^0.2.14
  file_picker: ^11.0.2
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  generate: true
  uses-material-design: true
  
  assets:
    - assets/icon/
    - assets/icon/app_icon.png

l10n:
  arb-dir: lib/l10n
  template-arb-file: app_en.arb
  output-localization-file: app_localizations.dart  
    
flutter_native_splash:
  color: "#020617"
  image: assets/icon/icon_dark.png
  android: true
  ios: true

  android_12:
    color: "#020617"
    image: assets/icon/icon_dark.png